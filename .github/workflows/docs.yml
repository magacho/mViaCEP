name: Docs

# Builda o site VitePress e publica no GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "examples/playground.html"
      - ".github/workflows/docs.yml"
      - "package.json"
  workflow_dispatch:

# Permissões mínimas para o deploy do Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Mantém o playground acessível na mesma URL (/examples/playground.html)
      # copiando-o para o public/ do VitePress antes do build.
      - name: Include live playground as a static asset
        run: |
          mkdir -p docs/public/examples
          cp examples/playground.html docs/public/examples/playground.html
      - run: npm run docs:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
